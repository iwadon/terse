name: Build and Test

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v5
      with:
        submodules: false
        fetch-depth: 0

    - name: Set up Python and dependencies
      run: |
        python -m pip install --upgrade pip
        pip install PyJWT requests

    - name: Get GitHub App installation token
      id: get_token
      env:
        APP_ID: ${{ secrets.APP_ID }}
        APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
        # Optional: INSTALLATION_ID can be set if you prefer fixed id
        # INSTALLATION_ID: ${{ secrets.INSTALLATION_ID }}
      run: |
        python .github/scripts/get_installation_token.py > /tmp/install_token.txt
        echo "INSTALL_TOKEN=$(cat /tmp/install_token.txt)" >> $GITHUB_ENV

    - name: Checkout repository
      uses: actions/checkout@v5
      with:
        token: ${{ env.INSTALL_TOKEN }}
        submodules: true
        fetch-depth: 0

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ninja-build cmake build-essential

    - name: Configure project
      run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

    - name: Build project
      run: ninja -C build

    - name: Run tests
      run: ctest --test-dir build --output-on-failure
